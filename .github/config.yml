repository:
  name: csharp
  type: learning-hub
  language: fr
  visibility: private

project:
  context: personal-learning
  subject: C# and .NET
  focus_areas:
    - C# language fundamentals
    - Object-oriented programming
    - Modern C# features
    - LINQ and functional patterns
    - Asynchronous programming
    - ASP.NET Core
    - Entity Framework Core
    - Unit testing
  owners:
    - "PtiCalin (Charlie)"
  default_branch: main

learning_objectives:
  primary:
    - Master C# syntax and conventions
    - Understand .NET framework capabilities
    - Build practical applications
    - Apply design patterns and SOLID principles
  secondary:
    - Document personal learning journey
    - Create reusable code examples
    - Maintain organized knowledge base

issue_management:
  blank_issues_enabled: true
  contact_links:
    - name: Report documentation issue
      url: https://github.com/PtiCalin/csharp/issues/new
      about: Report errors or suggest improvements to documentation.
  templates:
    learning_goal: .github/templates/ISSUE_TEMPLATE/learning_goal.md
    code_example: .github/templates/ISSUE_TEMPLATE/code_example.md
    exercise: .github/templates/ISSUE_TEMPLATE/exercise.md
    resource_suggestion: .github/templates/ISSUE_TEMPLATE/resource_suggestion.md

pull_requests:
  template: .github/templates/PULL-REQUEST_TEMPLATE.md
  require_template_sections:
    - Summary
    - Learning Area
    - Changes
    - Checklist
  minimum_reviewers: 0
  allow_self_review_checklist: true
  require_linked_issue: false
  squash_merge_recommended: false

branching:
  protected_branches:
    - main
  allow_direct_push:
    main: false
  allowed_prefixes:
    - theory/
    - example/
    - exercise/
    - docs/
    - resource/
  naming_pattern: "<type>/<topic>-<description>"

content_organization:
  structure:
    theory: "01-theory/"
    examples: "02-examples/"
    exercises: "03-exercices/"
    resources: "04-resources/"
    references: "05-references/"

  conventions:
    code_style: "Microsoft C# Coding Conventions"
    naming: "PascalCase for types, camelCase for locals"
    language_version: "C# 10+"
    framework_version: ".NET 6+"
  guideline: .github/versionning/BRANCHES.md

commits:
  template: .github/templates/COMMIT-MESSAGE_TEMPLATE.md
  conventional_commits: true
  allowed_types:
    - feat
    - fix
    - docs
    - test
    - refactor
    - chore
    - ci
    - perf
  guideline: .github/versionning/COMMITS.md

versioning:
  style: semantic
  tag_prefix: v
  release_branch_optional: true
  progression_examples:
    - v0.1.0
    - v0.2.0
    - v0.3.0
    - v1.0.0
  master_guideline: .github/versionning/VERSIONNING-GUIDELINES.md
  release_guideline: .github/versionning/RELEASES.md

docs_automation:
  changelog:
    file: CHANGE-LOG.md
    unreleased_header: "## [Unreleased]"
    script: .github/scripts/Update-Changelog.ps1
    workflow: .github/workflows/auto-changelog-readme.yml
  readme_sync:
    file: README.md
    marker_start: "<!-- LATEST-CHANGES:START -->"
    marker_end: "<!-- LATEST-CHANGES:END -->"
    script: .github/scripts/Update-ReadmeChanges.ps1
  release_promotion:
    script: .github/scripts/Promote-Changelog.ps1
    workflow: .github/workflows/auto-release-versioning.yml

attributions:
  file: ATTRIBUTIONS.md
  script: .github/scripts/Update-Attributions.ps1
  workflow: .github/workflows/auto-attributions.yml
  auto_scan_paths:
    - files/resources/**
    - files/assets/**
    - "**/*.bib"
    - "**/*.attribution"
  marker_start: "<!-- AUTO-ATTRIBUTIONS:START -->"
  marker_end: "<!-- AUTO-ATTRIBUTIONS:END -->"

security:
  policy_file: .github/SECURITY.md
  private_reporting_email: security-contact@example.com
  secrets_in_repo_allowed: false
  security_disclosure_private: true

deliverables:
  required:
    - README.md
    - LICENSE
    - AUTHORS.md
    - ATTRIBUTIONS.md
    - CHANGE-LOG.md
  milestone_release_required: true
  final_release_tag: v1.0.0

quality:
  reproducibility_required: true
  documentation_required: true
  changelog_required: true
  attribution_required: true
  latest_changes_sync_required: true
